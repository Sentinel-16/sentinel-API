services:
  - type: web
    name: sentinel-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api:app --bind 0.0.0.0:$PORT --timeout 30
    envVars:
      - key: ETHERSCAN_KEY
        sync: false
      - key: GOPLUS_KEY
        sync: false
      - key: TENDERLY_KEY
        sync: false
      - key: SENTINEL_API_KEY
        sync: false
